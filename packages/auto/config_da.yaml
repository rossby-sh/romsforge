# 

# === Preprocess config ===

std_dir: /home/shjo/data/nifs02/year/roms_inputs/std
std_file: nifs02_15km_nearest_std
scale_factor: 0.6 # 1 -> 100%, 0.5 -> 50%
bio_scale_factor: 0.1 # 1 -> 100%, 0.5 -> 50%
month_num: false # if ture, file name will be {std_file}_01.nc, if not {std_file}_jan.nc

# --- Initial & Boundary and Forcing ---
grdname : /home/shjo/data/nifs02/year/roms_inputs/roms_grd_15km_nearest.nc

weight_file: ./NWP_weight.nc
bio_weight_file: ./test_wgt.nc
calc_weight: True

ncformat: NETCDF3_64BIT  # NETCDF4 # NETCDF3_64BIT
force_write: True

flood_method_for_ini: griddata #griddata / edt / linearND
 
#initdate            : 2025-01-01 00:00:00 # 'YYYY-MM-DD HH:MM:SS'
ogcm_name: /home/shjo/data/nifs02/year/std/glorys_21y_Phy_std.nc

bio_model_type      : npzd # None, npzd, fennel 

ogcm_var_name:
    longitude       : longitude
    latitude        : latitude
    depth           : depth
    time            : time
    temperature     : temp_std
    salinity        : salt_std
    u               : u_std
    v               : v_std
    zeta            : zeta_std

time_ref            : seconds since 2000-1-1 00:00:00

global_attrs: 
    title           : ROMS ini
    type            : ROMS ini

global_attrs_bry: 
    title           : ROMS bry
    clm_file        : ROMS bry
    type            : ROMS bry
    history         : history

vertical:
    layer_n         : 36
    vtransform      : 2
    vstretching     : 4
    theta_s         : 6.5
    theta_b         : 1
    tcline          : 400

# === Add bio ===
bio_ogcm_name : /home/shjo/data/nifs02/year/std/glorys_21y_Bio_std.nc

bio_ogcm_var_name:
    longitude       : longitude
    latitude        : latitude
    depth           : depth
    time            : time
    phyt            : chl_std
    NO3             : no3_std
    PO4             : po4_std
    oxygen          : o2_std
    chl             : chl_std
    chlorophyll     : chl_std
    phytoplankton   : chl_std















